<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador Leandro Escafura</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 15px; margin: 0; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #007bff; text-align: center; }
        .box { border: 1px solid #ddd; padding: 10px; margin-bottom: 15px; border-radius: 5px; }
        label { display: block; font-weight: bold; font-size: 12px; margin-top: 10px; }
        input { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: left; }
        .btn { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        .btn-add { background: #28a745; padding: 8px; margin-top: 5px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container" id="app">
    <h2>Gerador de Orçamento</h2>
    
    <div class="box">
        <label>Cliente:</label>
        <input type="text" id="cli_nome" placeholder="Nome do cliente">
        <label>Endereço:</label>
        <input type="text" id="cli_end" placeholder="Endereço">
        <label>Nº Orçamento:</label>
        <input type="text" id="num_orc" placeholder="Ex: 37">
    </div>

    <div class="box">
        <strong>Serviços/Produtos</strong>
        <table id="tabelaItens">
            <thead><tr><th>Descrição</th><th>Qtd</th><th>Valor</th></tr></thead>
            <tbody>
                <tr>
                    <td><input type="text" class="item-nome"></td>
                    <td><input type="number" class="item-qtd" value="1"></td>
                    <td><input type="number" class="item-valor" value="0"></td>
                </tr>
            </tbody>
        </table>
        <button class="btn btn-add" onclick="addLinha()">+ Adicionar Item</button>
    </div>

    <button class="btn" onclick="gerarPDF()">GERAR PDF AGORA</button>
</div>

<script>
    function addLinha() {
        const tbody = document.querySelector('#tabelaItens tbody');
        const tr = document.createElement('tr');
        tr.innerHTML = '<td><input type="text" class="item-nome"></td><td><input type="number" class="item-qtd" value="1"></td><td><input type="number" class="item-valor" value="0"></td>';
        tbody.appendChild(tr);
    }

    function gerarPDF() {
        const cli = document.getElementById('cli_nome').value;
        const end = document.getElementById('cli_end').value;
        const num = document.getElementById('num_orc').value;
        let total = 0;
        let itensHtml = "";

        document.querySelectorAll('#tabelaItens tbody tr').forEach(tr => {
            const n = tr.querySelector('.item-nome').value;
            const q = tr.querySelector('.item-qtd').value;
            const v = tr.querySelector('.item-valor').value;
            const sub = q * v;
            total += sub;
            if(n) itensHtml += `<tr><td>${n}</td><td>${q}</td><td>R$ ${parseFloat(v).toFixed(2)}</td><td>R$ ${sub.toFixed(2)}</td></tr>`;
        });

        const conteudo = `
            <div style="padding:30px; font-family:Arial;">
                <h2 style="margin:0;">LEANDRO ARAUJO ESCAFURA</h2>
                <p>CNPJ: 63769965000163</p>
                <hr>
                <p><strong>Cliente:</strong> ${cli}<br><strong>Endereço:</strong> ${end}</p>
                ${num ? `<p><strong>ORÇAMENTO N° ${num}</strong></p>` : ''}
                <table border="1" style="width:100%; border-collapse:collapse; margin-top:20px;">
                    <tr style="background:#eee"><th>Item</th><th>Qtd</th><th>Unit</th><th>Total</th></tr>
                    ${itensHtml}
                </table>
                <h3 style="text-align:right; margin-top:20px;">Total: R$ ${total.toFixed(2)}</h3>
                <p style="font-size:10px; margin-top:40px;">Garantia: 3 meses serviço / 12 meses equipamento.</p>
            </div>
        `;

        const opt = { margin: 10, filename: 'orcamento.pdf', html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
        
        // Esta linha abaixo é a que corrige o erro da tela branca
        html2pdf().from(conteudo).set(opt).save().catch(err => alert("Erro ao gerar: " + err));
    }
</script>
</body>
</html>
