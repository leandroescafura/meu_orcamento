<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gerador de Orçamentos - Leandro Escafura</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* --- ESTILOS DO APP (O QUE VOCÊ VÊ NO CELULAR) --- */
        :root {
            --primary-color: #007bff; /* Azul profissional */
            --bg-color: #f4f7f6;
            --text-color: #333;
            --border-radius: 8px;
        }

        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); padding: 15px; margin: 0; }
        
        .app-container { max-width: 800px; margin: auto; background: #fff; padding: 25px; border-radius: var(--border-radius); box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        
        .main-title { text-align: center; color: var(--primary-color); margin-bottom: 25px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        .section-box { border: 1px solid #e1e1e1; border-radius: var(--border-radius); padding: 15px; margin-bottom: 20px; background-color: #fff; }
        .section-title { font-weight: bold; color: var(--primary-color); margin-bottom: 10px; border-bottom: 2px solid var(--primary-color); display: inline-block; padding-bottom: 3px; }

        .input-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px; transition: border-color 0.2s; }
        input:focus { border-color: var(--primary-color); outline: none; box-shadow: 0 0 0 3px rgba(0,123,255,0.1); }
        label { font-size: 13px; font-weight: bold; color: #666; margin-bottom: 3px; display: block; }

        /* Tabelas no App */
        .table-wrapper { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background-color: #f8f9fa; color: #555; text-transform: uppercase; font-size: 12px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        
        /* Inputs dentro da tabela */
        table input { padding: 8px; border: 1px solid #ddd; margin: 0; }
        table input.item-qtd { width: 60px; text-align: center; }
        table input.item-valor { width: 100px; text-align: right; }
        table input.item-un { width: 50px; text-align: center; }
        .item-total-cell { font-weight: bold; text-align: right; color: #333; min-width: 100px;}

        /* Botões */
        .btn { border: none; padding: 12px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 5px; text-transform: uppercase; letter-spacing: 0.5px;}
        .btn:active { transform: translateY(1px); }
        
        .btn-add { background-color: #28a745; color: white; margin-top: 10px; }
        .btn-add:hover { background-color: #218838; }

        .btn-remove { background-color: #dc3545; color: white; padding: 6px 10px; font-size: 11px; border-radius: 4px;}
        .btn-remove:hover { background-color: #c82333; }

        .btn-pdf { background-color: var(--primary-color); color: white; width: 100%; font-size: 18px; margin-top: 30px; height: 55px; justify-content: center; box-shadow: 0 4px 6px rgba(0,123,255,0.2); }
        .btn-pdf:hover { background-color: #0069d9; }

    </style>
</head>
<body>

<div class="app-container">
    <h1 class="main-title">Gerador de Orçamento</h1>
    
    <div class="section-box">
        <div class="section-title">Meus Dados</div>
        <div class="input-group">
            <div>
                <label>Seu Nome/Empresa:</label>
                <input type="text" id="emit_nome" value="LEANDRO ARAUJO ESCAFURA">
            </div>
            <div>
                <label>CNPJ:</label>
                <input type="text" id="emit_cnpj" value="63769965000163">
            </div>
            <div style="grid-column: 1 / -1;">
                <label>Seu Endereço:</label>
                <input type="text" id="emit_end" value="Rua Condor - Serra Dourada III, Serra/ES">
            </div>
        </div>
    </div>

    <div class="section-box">
        <div class="section-title">Dados do Cliente</div>
        <div class="input-group">
            <div>
                <label>Nome do Cliente:</label>
                <input type="text" id="cli_nome" placeholder="Ex: Henri marques">
            </div>
            <div>
                <label>Endereço do Cliente:</label>
                <input type="text" id="cli_end" placeholder="Ex: Rua te taco pau">
            </div>
            <div>
                <label>Orçamento Nº (Opcional):</label>
                <input type="text" id="num_orc" placeholder="Ex: 37 (Vazio = ocultar)">
            </div>
        </div>
    </div>

    <div class="section-box">
        <div class="section-title">Serviços</div>
        <div class="table-wrapper">
            <table id="tabelaServicos">
                <thead><tr><th style="width: 50%;">Nome/Descrição</th><th>Qtd</th><th>Un</th><th>V. Unit (R$)</th><th style="text-align: right;">Total</th><th>Ação</th></tr></thead>
                <tbody>
                    <tr>
                        <td><input type="text" class="item-nome" placeholder="Ex: Troca de cabo extensor"></td>
                        <td><input type="number" class="item-qtd" value="1" min="1" oninput="recalc(this)"></td>
                        <td><input type="text" class="item-un" value="un" placeholder="un"></td>
                        <td><input type="number" class="item-valor" value="0.00" step="0.01" oninput="recalc(this)"></td>
                        <td class="item-total-cell">R$ 0.00</td>
                        <td><button class="btn btn-remove" onclick="removerLinha(this)">X</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
        <button class="btn btn-add" onclick="addLinha('tabelaServicos')">+ Novo Serviço</button>
    </div>

    <div class="section-box">
        <div class="section-title">Produtos</div>
        <div class="table-wrapper">
            <table id="tabelaProdutos">
                <thead><tr><th style="width: 50%;">Nome/Descrição</th><th>Qtd</th><th>Un</th><th>V. Unit (R$)</th><th style="text-align: right;">Total</th><th>Ação</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <button class="btn btn-add" onclick="addLinha('tabelaProdutos')">+ Novo Produto</button>
    </div>

    <button class="btn btn-pdf" onclick="gerarPDF()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        Baixar Orçamento em PDF
    </button>
</div>

<script>
    // --- LÓGICA DO APP ---

    function addLinha(idTabela) {
        const tbody = document.getElementById(idTabela).querySelector('tbody');
        const novaLinha = document.createElement('tr');
        novaLinha.innerHTML = `
            <td><input type="text" class="item-nome" placeholder="Descrição"></td>
            <td><input type="number" class="item-qtd" value="1" min="1" oninput="recalc(this)"></td>
            <td><input type="text" class="item-un" value="un" placeholder="un"></td>
            <td><input type="number" class="item-valor" value="0.00" step="0.01" oninput="recalc(this)"></td>
            <td class="item-total-cell">R$ 0.00</td>
            <td><button class="btn btn-remove" onclick="removerLinha(this)">X</button></td>
        `;
        tbody.appendChild(novaLinha);
    }

    function removerLinha(btn) {
        btn.parentElement.parentElement.remove();
    }

    function recalc(el) {
        const tr = el.parentElement.parentElement;
        const qtd = parseFloat(tr.querySelector('.item-qtd').value) || 0;
        const valor = parseFloat(tr.querySelector('.item-valor').value) || 0;
        const total = qtd * valor;
        tr.querySelector('.item-total-cell').innerText = "R$ " + total.toFixed(2);
    }

    // --- GERAÇÃO DO PDF (LAYOUT PROFISSIONAL) ---
    function gerarPDF() {
        const cliNome = document.getElementById('cli_nome').value || "Cliente";
        const numOrc = document.getElementById('num_orc').value;
        const dataAtual = new Date().toLocaleDateString('pt-BR');

        let totalServ = 0;
        let totalProd = 0;

        // Função para formatar moeda
        const fmt = (v) => "R$ " + v.toFixed(2);

        // Processar Tabelas
        function processarItens(idTabela, isServico) {
            let html = "";
            document.querySelectorAll(`#${idTabela} tbody tr`).forEach(tr => {
                const nome = tr.querySelector('.item-nome').value;
                const qtd = parseFloat(tr.querySelector('.item-qtd').value) || 0;
                const un = tr.querySelector('.item-un').value || 'un';
                const valor = parseFloat(tr.querySelector('.item-valor').value) || 0;
                
                if (nome && qtd > 0) {
                    const sub = qtd * valor;
                    if (isServico) totalServ += sub; else totalProd += sub;
                    
                    html += `
                        <tr style="border-bottom: 1px solid #eee;">
                            <td style="padding: 10px; font-size: 11px;">${nome}</td>
                            <td style="padding: 10px; text-align: center; width: 30px;">${qtd}</td>
                            <td style="padding: 10px; text-align: center; width: 30px;">${un}</td>
                            <td style="padding: 10px; text-align: right; width: 80px;">${fmt(valor)}</td>
                            <td style="padding: 10px; text-align: right; font-weight: bold; width: 90px;">${fmt(sub)}</td>
                        </tr>
                    `;
                }
            });
            return html;
        }

        const linhasServ = processarItens('tabelaServicos', true);
        const linhasProd = processarItens('tabelaProdutos', false);

        // --- LAYOUT DO PDF FINAL (BEM PARECIDO COM O MODELO) ---
        const layoutPDF = `
            <div style="font-family: Arial, sans-serif; color: #333; padding: 30px; line-height: 1.4;">
                
                <div style="border-bottom: 1.5px solid #333; padding-bottom: 15px; margin-bottom: 25px;">
                    <h1 style="margin: 0; font-size: 20px; text-transform: uppercase; letter-spacing: 1px; color: #000;">${document.getElementById('emit_nome').value}</h1>
                    <p style="margin: 4px 0; font-size: 12px; font-weight: bold;">${document.getElementById('emit_cnpj').value}</p>
                    <p style="margin: 2px 0; font-size: 11px; color: #555;">${document.getElementById('emit_end').value}</p>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 25px; gap: 20px;">
                    <div style="flex: 1; border: 1px solid #ccc; border-radius: 4px; overflow: hidden;">
                        <div style="background-color: #f2f2f2; padding: 6px 10px; font-weight: bold; font-size: 11px; border-bottom: 1px solid #ccc;">Dados do Cliente</div>
                        <div style="padding: 12px; font-size: 12px;">
                            <strong style="font-size: 14px;">${cliNome}</strong><br>
                            <span style="color: #666; margin-top: 4px; display: block;">${document.getElementById('cli_end').value}</span>
                        </div>
                    </div>
                    ${numOrc ? `
                    <div style="text-align: right; font-size: 12px; min-width: 150px; font-weight: bold; color: #000; text-transform: uppercase; margin-top: 5px;">
                        ORÇAMENTO N° ${numOrc}
                    </div>` : ''}
                </div>

                ${linhasServ ? `
                <div style="margin-bottom: 25px;">
                    <h3 style="margin: 0 0 8px 0; font-size: 14px; color: #000; border-left: 3px solid #000; padding-left: 8px;">Serviços</h3>
                    <table style="width: 100%; border-collapse: collapse; border: 1px solid #ccc; font-size: 11px;">
                        <thead style="background-color: #f2f2f2;">
                            <tr><th style="padding: 8px; text-align: left; border: 1px solid #ccc;">Nome/Descrição</th><th style="padding: 8px; text-align: center; border: 1px solid #ccc;">Qtd</th><th style="padding: 8px; text-align: center; border: 1px solid #ccc;">Un</th><th style="padding: 8px; text-align: right; border: 1px solid #ccc;">V. Unit</th><th style="padding: 8px; text-align: right; border: 1px solid #ccc;">Total</th></tr>
                        </thead>
                        <tbody>${linhasServ}</tbody>
                        <tfoot>
                            <tr><td colspan="4" style="text-align: right; padding: 10px; font-weight: bold; border: 1px solid #ccc; background-color: #f9f9f9;">Total Serviços</td><td style="text-align: right; padding: 10px; font-weight: bold; font-size: 12px; border: 1px solid #ccc; background-color: #f9f9f9;">${fmt(totalServ)}</td></tr>
                        </tfoot>
                    </table>
                </div>` : ''}

                ${linhasProd ? `
                <div style="margin-bottom: 25px;">
                    <h3 style="margin: 0 0 8px 0; font-size: 14px; color: #000; border-left: 3px solid #000; padding-left: 8px;">Produtos</h3>
                    <table style="width: 100%; border-collapse: collapse; border: 1px solid #ccc; font-size: 11px;">
                        <thead style="background-color: #f2f2f2;">
                            <tr><th style="padding: 8px; text-align: left; border: 1px solid #ccc;">Nome/Descrição</th><th style="padding: 8px; text-align: center; border: 1px solid #ccc;">Qtd</th><th style="padding: 8px; text-align: center; border: 1px solid #ccc;">Un</th><th style="padding: 8px; text-align: right; border: 1px solid #ccc;">V. Unit</th><th style="padding: 8px; text-align: right; border: 1px solid #ccc;">Total</th></tr>
                        </thead>
                        <tbody>${linhasProd}</tbody>
                    </table>
                </div>` : ''}

                <div style="display: flex; justify-content: flex-end; margin-top: 20px;">
                    <div style="border: 1.5px solid #000; padding: 15px; width: 220px; text-align: right;">
                        <p style="margin: 0 0 6px 0; font-size: 11px; color: #555;">Total Produtos: ${fmt(totalProd)}</p>
                        <p style="margin: 0 0 6px 0; font-size: 11px; color: #555;">Subtotal: ${fmt(totalServ + totalProd)}</p>
                        <p style="margin: 0; font-size: 16px; font-weight: bold; color: #000;">Total Orçamento: ${fmt(totalServ + totalProd)}</p>
                    </div>
                </div>

                <div style="margin-top: 40px; font-size: 10px; color: #666; border-top: 1px solid #eee; padding-top: 15px;">
                    <p style="margin: 3px 0;"><strong>Formas de Pagamento:</strong> Dinheiro, Transferência Bancária, Pix (Chave: ${document.getElementById('emit_cnpj').value})</p>
                    <p style="margin: 3px 0;"><strong>Garantia:</strong> 3 Meses (Serviço) | 12 Meses (Equipamento)</p>
                    <p style="margin: 8px 0 0 0; text-align: right; color: #999;">Emissão: ${dataAtual}</p>
                </div>

            </div>
        `;

        // Opções do PDF
        const opt = {
            margin: 0,
            filename: `Orcamento_${cliNome}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 3, letterRendering: true, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        // Gerar
        html2pdf().from(layoutPDF).set(opt).save();
    }
</script>
</body>
</html>
